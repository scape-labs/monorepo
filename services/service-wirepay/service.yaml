---
# dsl v0.8
version: "0.8"
name: service.wirepay
team: wirepay

build:
  image: ghcr.io/scape-labs/monorepo/wirepay

deployment:
  base:
    replicas: 1
    ports: { http: 8080 }
    env: {}
    health:
      liveness: /healthz
      readiness: /readyz

descriptor:
  description: |
    TODO: money movement service — system of record for funds. Owns accounts,
    transfers, and the engine that runs Adaptor → Deciders → Effectors per
    request.
  tier: 0
  oncall:
    pagerduty: wirepay-primary
    slack: "#oncall-wirepay"

slos:
  availability:
    target: 99.99
    window: 30d
  latency:
    p99_ms: 800
    route: /v1/transfers
  error_rate:
    target: 0.01
    window: 30d
  # Tier 0 — no SLO violations tolerated; we page on any p99 > 1s.
  page_on_p99_breach: true

dependencies:
  upstream:
    - service.flow      # flow.task.completed → kick off transfer
    - service.dura      # loan.disbursed → initiate disbursement transfer
  downstream:
    - rabbitmq  # transfer.* events
    - postgres  # ledger (system of record)
    - redis     # idempotency keys

egress:
  http_clients:
    - name: ecocash
      base_url: https://api.ecocash.example
      timeout_ms: 5000
    - name: mpesa
      base_url: https://api.mpesa.example
      timeout_ms: 5000
    - name: visanet
      base_url: https://api.visanet.example
      timeout_ms: 5000
  secrets:
    - name: wirepay/ledger-key
      provider: vault
