---
# dsl v0.8
version: "0.8"
name: service.flow
team: flow

build:
  image: ghcr.io/scape-labs/monorepo/flow

deployment:
  base:
    replicas: 1
    ports: { http: 8080 }
    env: {}
    health:
      liveness: /healthz
      readiness: /readyz

descriptor:
  description: |
    TODO: workflow orchestration service — owns the workflow/task model used
    by every other service to express multi-step, multi-system processes.
  tier: 1
  oncall:
    pagerduty: flow-primary
    slack: "#oncall-flow"

slos:
  availability:
    target: 99.9
    window: 30d
  latency:
    p99_ms: 400
    route: /v1/tasks
  error_rate:
    target: 0.1
    window: 30d

dependencies:
  upstream: []    # flow is the orchestrator; nothing upstream.
  downstream:
    - service.wirepay   # flow → wirepay: tasks invoke transfers via wirepay's RPC API
    - service.dura      # flow → dura: tasks advance the loan lifecycle (disburse, repay)
    - service.bulksms   # flow → bulksms: tasks dispatch transactional SMS / email notifications
    - rabbitmq          # async bus for task.completed / task.failed events
    - postgres          # durable store for workflow and task state
