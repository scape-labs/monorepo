# Per-service CI — inherits from the workspace-level ci.yml by reusing the
# same reusable workflows.

name: ci-flow-ussd

on:
  push:
    paths:
      - 'services/flow-ussd/**'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'services/flow-ussd/**'

jobs:
  test:
    uses: scape-labs/ci-actions/.github/workflows/go-test.yml@v1
    with:
      service: flow-ussd

  build:
    needs: test
    uses: scape-labs/ci-actions/.github/workflows/go-build.yml@v1
    with:
      service: flow-ussd
